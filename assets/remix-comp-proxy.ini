; remix-comp-proxy configuration (d3d9.dll proxy)
; Adapted from xoxor4d/remix-comp-base by kim2091 for Vibe Reverse Engineering

[Remix]
Enabled=1
DLLName=d3d9_remix.dll

; ============================================================
; ThiefGold RHW Unprojection
;
; Reconstructs world-space geometry from NewDark's pre-transformed
; screen-space vertices using live camera state read from the engine.
; Calibration knobs: YawSign/YawOffsetDeg/PitchSign adjust the camera
; basis if world orientation is wrong (rasterized image is unaffected
; by construction). FovRefDeg must match the engine's cam_ext.cfg fov.
; ============================================================
[Unproject]
Enabled=1
ForceWhiteDiffuse=0
FovRefDeg=90
YawSign=1
YawOffsetDeg=0
PitchSign=1
UiRhwEpsilon=0.001
; Log per-draw classification signals for N in-mission frames to
; rtx_comp\unproject_debug.log (0 = off)
DebugLogFrames=0
ZNear=0.25
ZFar=2048
; Snap world positions to a 1/N grid so static geometry hashes stably
; across frames (0 = off)
QuantizeGrid=64

; ============================================================
; Worldrep whole-polygon submission (phase 3 — hash stability)
;
; When enabled, world geometry is submitted from the resident,
; unclipped worldrep cell array (stable vertex content = stable
; Remix hashes across camera motion) instead of from the engine's
; per-frame clipped RHW fans. Objects still use Unproject.
; Set Enabled=0 to fall back to the pure-unproject path.
; WindingFlip: flip if world faces render inside-out.
; ============================================================
[Worldrep]
Enabled=1
WindingFlip=0
; Comma-separated worldrep texture ids to drop from submission.
; 249 = the Dark engine sky-hack surface (otherwise renders as a white plane).
; The proxy log's "Buckets (texId:tris)" line lists all ids by size.
SkipTexIds=249
; LightmapAttenuation: 0=off .. 1=full. Darkens world vertex color by the
;   engine's baked (static) lightmap luminance so designed-dark areas eat
;   bounce light instead of glowing under the path tracer.
LightmapAttenuation=0.7

; ============================================================
; Engine light injection (lighting phase)
;
; Mirrors the Dark engine's runtime light table into Remix as
; path-traced sphere lights each frame. Animated (flickering)
; lights track automatically because the engine rewrites their
; colors in the same table. Set Enabled=0 to fall back to
; Remix's default lighting.
; RadianceScale: engine color units -> Remix radiance.
; EmitterRadius: sphere emitter size in engine units (~feet).
; SkipInfinite:  skip radius==0 records. Leave 0 — radius 0 is
;                common on normal lights (torches), not just ambient.
; ============================================================
[Lights]
Enabled=1
RadianceScale=10.0
EmitterRadius=0.4
SkipInfinite=0
; ForceSpot: shape lights with a stored direction as spotlights (torches
;   store straight-down). Lights with no direction stay sphere lights.
;   Cone from the record when valid, else ConeAngleDeg. ConeSoftness 0..1.
ForceSpot=0
ConeAngleDeg=70
ConeSoftness=0.5

; ============================================================
; DLL/ASI Chain Loading
;
; PreLoad:  Loaded during DllMain, before the d3d9 chain.
; PostLoad: Loaded after the game window is found.
;
; Semicolon-separated. Paths relative to the game directory.
; Supports .dll and .asi files.
;
; Example: PreLoad=patch.dll;fix.asi
; ============================================================
[Chain]
PreLoad=
PostLoad=

; ============================================================
; FFP Conversion Settings
;
; Set Enabled=0 to disable FFP conversion entirely (passthrough mode).
; Useful for tracing or non-FFP mods.
; ============================================================
[FFP]
Enabled=1
AlbedoStage=0

; ============================================================
; Skinning (OFF by default)
;
; Only enable after rigid FFP geometry works correctly.
; See documentation for skinning setup workflow.
; ============================================================
[Skinning]
Enabled=0

; ============================================================
; Diagnostic Logging
;
; AutoCapture: Writes rtx_comp\diagnostics.log after DelayMs milliseconds.
; Logs LogFrames frames of draw call data for debugging.
; The delay ensures the game is in-game with real geometry.
;
; On-demand capture is always available from the ImGui overlay
; (F4 -> Diagnostics tab) regardless of AutoCapture setting.
;
; Log categories control what data is captured.
; All categories default to ON. Disable to reduce log noise.
; ============================================================
[Diagnostics]
Enabled=1
AutoCapture=1
DelayMs=50000
LogFrames=3
LogDrawCalls=1
LogVSConstants=1
LogVertexData=1
LogDeclarations=1
LogTextures=1
LogPresentInfo=1

; ============================================================
; Frame Tracer
;
; Integrated D3D9 call tracer. Captures all API calls to JSONL
; for offline analysis with:
;   python -m graphics.directx.dx9.tracer analyze <file.jsonl> --summary
;
; FFP is automatically disabled during capture to record
; the game's unmodified calls.
; ============================================================
[Tracer]
BacktraceDepth=8
OutputDir=captures
